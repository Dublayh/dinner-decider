name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Fix paths and inject base URL router fix
        run: |
          # Fix script src in index.html
          sed -i 's|src="/_expo/|src="/dinner-decider/_expo/|g' dist/index.html

          # Fix uri: asset paths in the JS bundle
          find dist/_expo -name "*.js" -exec sed -i 's|uri:"/assets/|uri:"/dinner-decider/assets/|g' {} \;

          # Fix favicon
          sed -i 's|href="/favicon|href="/dinner-decider/favicon|g' dist/index.html

          # Inject script to strip /dinner-decider prefix before expo-router sees the URL
          sed -i 's|</head>|<script>if(window.location.pathname.startsWith("/dinner-decider")){var p=window.location.pathname.slice(15)||"/";window.history.replaceState(null,"",p+window.location.search+window.location.hash);}</script></head>|' dist/index.html

          # Copy as 404 fallback for all routes
          cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
