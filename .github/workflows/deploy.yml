name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Fix asset paths
        run: |
          python3 << 'PYEOF'
          import glob

          with open('dist/index.html', 'r') as f:
              html = f.read()

          with open('dist/404.html', 'w') as f:
              f.write(html)

          for js_file in glob.glob('dist/_expo/**/*.js', recursive=True):
              with open(js_file, 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              if 'uri:"/assets/' in content:
                  content = content.replace('uri:"/assets/', 'uri:"/assets/')
                  with open(js_file, 'w', encoding='utf-8') as f:
                      f.write(content)

          print('Done')
          PYEOF

      - name: Deploy to dublayh.github.io
        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Actions"
          cd dist
          git init
          git add .
          git commit -m "Deploy Let's Eat PWA"
          git push --force https://x-access-token:${{ secrets.PAGES_TOKEN }}@github.com/Dublayh/dublayh.github.io.git master:main
