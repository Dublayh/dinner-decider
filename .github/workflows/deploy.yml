name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Fix paths and inject PWA icons
        run: |
          python3 << 'PYEOF'
          import glob, shutil, os

          # Copy icon files into dist so they're served
          os.makedirs('dist/assets', exist_ok=True)
          shutil.copy('assets/icon.png', 'dist/assets/icon.png')
          shutil.copy('assets/favicon.png', 'dist/assets/favicon.png')

          with open('dist/index.html', 'r') as f:
              html = f.read()

          # Inject apple touch icon and PWA icon links
          icon_tags = '<link rel="apple-touch-icon" sizes="1024x1024" href="/assets/icon.png"><link rel="icon" type="image/png" sizes="1024x1024" href="/assets/icon.png">'
          html = html.replace('</head>', icon_tags + '</head>')

          # Inject global CSS to remove browser default focus rings on inputs
          global_css = '<style>input:focus,textarea:focus{outline:none!important;box-shadow:none!important;}</style>'
          html = html.replace('</head>', global_css + '</head>')

          with open('dist/index.html', 'w') as f:
              f.write(html)

          # Copy as 404 fallback
          with open('dist/404.html', 'w') as f:
              f.write(html)

          # Add .nojekyll
          open('dist/.nojekyll', 'w').close()

          print('Done')
          PYEOF

      - name: Deploy to dublayh.github.io
        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Actions"
          cd dist
          git init
          git add .
          git commit -m "Deploy Let's Eat PWA"
          git push --force https://x-access-token:${{ secrets.PAGES_TOKEN }}@github.com/Dublayh/dublayh.github.io.git master:main
