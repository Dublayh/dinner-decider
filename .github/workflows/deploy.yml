name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          sed -i 's|src="/_expo/|src="/dinner-decider/_expo/|g' dist/index.html
          sed -i 's|href="/_expo/|href="/dinner-decider/_expo/|g' dist/index.html
          sed -i 's|href="/assets/|href="/dinner-decider/assets/|g' dist/index.html
          sed -i 's|href="/favicon|href="/dinner-decider/favicon|g' dist/index.html
          cp dist/index.html dist/404.html
          find dist/_expo -name "*.js" -exec sed -i 's|"/assets/|"/dinner-decider/assets/|g' {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
