name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build PWA
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo export --platform web

      - name: Fix paths and inject router fix
        run: |
          python3 << 'PYEOF'
          import os, glob

          # Fix index.html
          with open('dist/index.html', 'r') as f:
              html = f.read()

          html = html.replace('src="/_expo/', 'src="/dinner-decider/_expo/')
          html = html.replace('href="/favicon', 'href="/dinner-decider/favicon')

          # Inject base path fix script before </head>
          fix_script = '<script>if(window.location.pathname.startsWith("/dinner-decider")){var p=window.location.pathname.slice(15)||"/";window.history.replaceState(null,"",p+window.location.search+window.location.hash);}</script>'
          html = html.replace('</head>', fix_script + '</head>')

          with open('dist/index.html', 'w') as f:
              f.write(html)

          # Copy as 404 fallback
          with open('dist/404.html', 'w') as f:
              f.write(html)

          # Fix uri: asset paths in JS bundle
          for js_file in glob.glob('dist/_expo/**/*.js', recursive=True):
              with open(js_file, 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              if 'uri:"/assets/' in content:
                  content = content.replace('uri:"/assets/', 'uri:"/dinner-decider/assets/')
                  with open(js_file, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f'Fixed: {js_file}')

          print('Done')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
